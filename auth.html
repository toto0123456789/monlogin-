<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { min-height: 100vh; background: #0d0d1a; display: flex; align-items: center; justify-content: center; font-family: 'Poppins', sans-serif; }
    .box { background: linear-gradient(145deg, #13132a, #1a1a35); border-radius: 20px; width: 360px; border: 1px solid rgba(255,255,255,0.07); box-shadow: 0 20px 60px rgba(0,0,0,0.6); overflow: hidden; }
    .tabs { display: flex; border-bottom: 1px solid rgba(255,255,255,0.07); }
    .tab { flex: 1; padding: 18px; text-align: center; font-size: 0.85rem; font-weight: 500; color: #555a7a; cursor: pointer; border: none; background: transparent; letter-spacing: 1px; transition: all 0.3s; position: relative; }
    .tab.active { color: #ff4d9e; }
    .tab.active::after { content: ''; position: absolute; bottom: -1px; left: 10%; right: 10%; height: 2px; background: #ff4d9e; border-radius: 2px; box-shadow: 0 0 10px #ff4d9e; }
    .content { padding: 36px 32px 32px; }
    .section { display: none; animation: fadeIn 0.3s ease; }
    .section.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .title { text-align: center; color: #fff; font-size: 1rem; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 28px; }
    .heart { color: #ff4d9e; display: inline-block; animation: heartbeat 1.4s ease-in-out infinite; margin-left: 6px; }
    @keyframes heartbeat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.3); } }
    .field { margin-bottom: 16px; }
    .field input { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 13px 16px; color: #fff; font-family: 'Poppins', sans-serif; font-size: 0.85rem; outline: none; transition: all 0.3s; }
    .field input::placeholder { color: #3a3d5c; }
    .field input:focus { border-color: #ff4d9e; background: rgba(255,77,158,0.05); box-shadow: 0 0 0 3px rgba(255,77,158,0.1); }
    .btn { width: 100%; padding: 13px; border: none; border-radius: 10px; background: linear-gradient(135deg, #ff4d9e, #c0392b); color: #fff; font-family: 'Poppins', sans-serif; font-size: 0.85rem; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; margin-top: 4px; transition: all 0.3s; box-shadow: 0 4px 20px rgba(255,77,158,0.35); }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(255,77,158,0.55); }
    .links { display: flex; justify-content: center; gap: 20px; margin-top: 16px; }
    .links a { font-size: 0.73rem; color: #ff4d9e; cursor: pointer; opacity: 0.7; transition: all 0.3s; text-decoration: none; }
    .links a:hover { opacity: 1; text-shadow: 0 0 10px #ff4d9e; }
    .msg { margin-top: 14px; padding: 10px; border-radius: 8px; font-size: 0.76rem; text-align: center; display: none; animation: fadeIn 0.3s ease; }
    .msg.success { background: rgba(0,255,100,0.07); border: 1px solid rgba(0,255,100,0.2); color: #00ff64; }
    .msg.error   { background: rgba(255,60,60,0.07); border: 1px solid rgba(255,60,60,0.2); color: #ff4343; }
    .msg.info    { background: rgba(255,77,158,0.07); border: 1px solid rgba(255,77,158,0.25); color: #ff4d9e; }
    .forgot-desc { color: #555a7a; font-size: 0.78rem; text-align: center; margin-bottom: 18px; line-height: 1.6; }
    .dashboard { display: none; animation: fadeIn 0.4s ease; }
    .dash-header { background: linear-gradient(135deg, rgba(255,77,158,0.15), rgba(192,57,43,0.1)); padding: 20px 32px 16px; border-bottom: 1px solid rgba(255,255,255,0.07); text-align: center; }
    .dash-avatar { width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, #ff4d9e, #c0392b); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; margin: 0 auto 8px; box-shadow: 0 0 25px rgba(255,77,158,0.4); }
    .dash-email { color: #888; font-size: 0.75rem; margin-top: 3px; }
    .dash-name { color: #fff; font-size: 0.9rem; font-weight: 600; }
    .dash-tabs { display: flex; border-bottom: 1px solid rgba(255,255,255,0.07); }
    .dash-tab { flex: 1; padding: 13px; text-align: center; font-size: 0.78rem; font-weight: 500; color: #555a7a; cursor: pointer; border: none; background: transparent; letter-spacing: 1px; transition: all 0.3s; position: relative; }
    .dash-tab.active { color: #ff4d9e; }
    .dash-tab.active::after { content: ''; position: absolute; bottom: -1px; left: 10%; right: 10%; height: 2px; background: #ff4d9e; border-radius: 2px; box-shadow: 0 0 10px #ff4d9e; }
    .dash-content { padding: 20px 24px 24px; }
    .dash-section { display: none; animation: fadeIn 0.3s ease; }
    .dash-section.active { display: block; }
    .search-wrap { position: relative; margin-bottom: 16px; }
    .search-wrap input { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 11px 16px 11px 38px; color: #fff; font-family: 'Poppins', sans-serif; font-size: 0.82rem; outline: none; transition: all 0.3s; }
    .search-wrap input::placeholder { color: #3a3d5c; }
    .search-wrap input:focus { border-color: #ff4d9e; box-shadow: 0 0 0 3px rgba(255,77,158,0.1); }
    .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 0.9rem; pointer-events: none; }
    .no-result { color: #555a7a; font-size: 0.8rem; text-align: center; padding: 20px 0; }
    .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-height: 300px; overflow-y: auto; padding-right: 2px; }
    .game-grid::-webkit-scrollbar { width: 4px; }
    .game-grid::-webkit-scrollbar-thumb { background: #ff4d9e44; border-radius: 2px; }
    .game-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 14px 10px; text-align: center; cursor: pointer; transition: all 0.3s; position: relative; }
    .game-card:hover { border-color: #ff4d9e; background: rgba(255,77,158,0.07); transform: translateY(-2px); box-shadow: 0 4px 15px rgba(255,77,158,0.2); }
    .game-card.has-saves { border-color: rgba(0,255,100,0.3); }
    .save-count { position: absolute; top: 6px; right: 8px; background: #ff4d9e; color: #fff; font-size: 0.6rem; font-weight: 700; padding: 2px 6px; border-radius: 10px; }
    .game-card .icon { font-size: 1.6rem; margin-bottom: 6px; }
    .game-card .name { color: #fff; font-size: 0.72rem; font-weight: 600; }
    .game-card .status { color: #555a7a; font-size: 0.65rem; margin-top: 2px; }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; animation: fadeIn 0.2s ease; }
    .modal { background: linear-gradient(145deg, #13132a, #1a1a35); border: 1px solid rgba(255,255,255,0.1); border-radius: 18px; padding: 24px; width: 310px; max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.8); animation: slideUp 0.3s ease; }
    .modal::-webkit-scrollbar { width: 4px; }
    .modal::-webkit-scrollbar-thumb { background: #ff4d9e44; border-radius: 2px; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .modal-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .modal-icon { font-size: 2rem; }
    .modal-title { color: #fff; font-size: 0.95rem; font-weight: 700; }
    .modal-sub { color: #555a7a; font-size: 0.72rem; margin-top: 2px; }
    .save-item { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 14px; margin-bottom: 10px; }
    .save-item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .save-label { color: #ff4d9e; font-size: 0.72rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
    .save-actions { display: flex; gap: 6px; }
    .btn-icon { background: transparent; border: none; cursor: pointer; font-size: 0.9rem; opacity: 0.6; transition: all 0.2s; padding: 2px; }
    .btn-icon:hover { opacity: 1; transform: scale(1.2); }
    .save-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .save-row:last-child { margin-bottom: 0; }
    .save-key { color: #555a7a; font-size: 0.7rem; }
    .save-val { color: #fff; font-size: 0.78rem; font-weight: 600; display: flex; align-items: center; gap: 6px; }
    .eye-btn { background: transparent; border: none; cursor: pointer; font-size: 0.85rem; opacity: 0.5; transition: all 0.2s; padding: 0; line-height: 1; }
    .eye-btn:hover { opacity: 1; }
    .add-form { background: rgba(255,77,158,0.05); border: 1px solid rgba(255,77,158,0.2); border-radius: 12px; padding: 16px; margin-bottom: 10px; display: none; animation: fadeIn 0.3s ease; }
    .add-form.open { display: block; }
    .add-form-title { color: #ff4d9e; font-size: 0.72rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 14px; }
    .add-form .field { margin-bottom: 12px; }
    .add-form .field input { padding: 10px 14px; font-size: 0.8rem; }

    /* Champ mot de passe avec œil */
    .pass-wrap { position: relative; }
    .pass-wrap input { padding-right: 42px !important; }
    .pass-toggle { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: transparent; border: none; cursor: pointer; font-size: 1rem; opacity: 0.5; transition: all 0.2s; }
    .pass-toggle:hover { opacity: 1; }

    .btn-add { width: 100%; padding: 11px; border: 1px dashed rgba(255,77,158,0.4); border-radius: 10px; background: transparent; color: #ff4d9e; font-family: 'Poppins', sans-serif; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.3s; letter-spacing: 1px; }
    .btn-add:hover { background: rgba(255,77,158,0.08); border-color: #ff4d9e; }
    .btn-save-sm { flex: 1; padding: 10px; border: none; border-radius: 8px; background: linear-gradient(135deg, #ff4d9e, #c0392b); color: #fff; font-family: 'Poppins', sans-serif; font-size: 0.75rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: all 0.3s; }
    .btn-cancel-sm { flex: 1; padding: 10px; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; background: transparent; color: #555a7a; font-family: 'Poppins', sans-serif; font-size: 0.75rem; letter-spacing: 1px; cursor: pointer; transition: all 0.3s; text-transform: uppercase; }
    .btn-cancel-sm:hover { border-color: #ff4d9e; color: #ff4d9e; }
    .form-btns { display: flex; gap: 8px; margin-top: 4px; }
    .btn-close-modal { width: 100%; padding: 10px; border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; background: transparent; color: #555a7a; font-family: 'Poppins', sans-serif; font-size: 0.78rem; letter-spacing: 1px; cursor: pointer; transition: all 0.3s; text-transform: uppercase; margin-top: 10px; }
    .btn-close-modal:hover { border-color: #ff4d9e; color: #ff4d9e; }
    .empty-saves { color: #555a7a; font-size: 0.8rem; text-align: center; padding: 16px 0 8px; }
    .setting-title { color: #ff4d9e; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 12px; font-weight: 600; }
    .setting-block { margin-bottom: 22px; }
    .setting-block .field input { font-size: 0.8rem; padding: 11px 14px; }
    .btn-sm { width: 100%; padding: 11px; border: none; border-radius: 10px; background: linear-gradient(135deg, #ff4d9e, #c0392b); color: #fff; font-family: 'Poppins', sans-serif; font-size: 0.78rem; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all 0.3s; box-shadow: 0 4px 15px rgba(255,77,158,0.3); }
    .btn-logout-dash { width: 100%; padding: 11px; border: 1px solid rgba(255,77,158,0.3); border-radius: 10px; background: transparent; color: #555a7a; font-family: 'Poppins', sans-serif; font-size: 0.78rem; letter-spacing: 2px; cursor: pointer; transition: all 0.3s; text-transform: uppercase; margin-top: 8px; }
    .btn-logout-dash:hover { border-color: #ff4d9e; color: #ff4d9e; }
  </style>
</head>
<body>

<div class="box" id="mainBox">
  <div class="tabs" id="tabsBar">
    <button class="tab active" onclick="switchTab('login')">Connexion</button>
    <button class="tab" onclick="switchTab('register')">S'inscrire</button>
  </div>
  <div class="content" id="authContent">
    <div class="section active" id="loginSection">
      <div class="title">Sign In <span class="heart">♥</span></div>
      <div class="field"><input type="email" id="loginEmail" placeholder="Adresse mail" /></div>
      <div class="field">
        <div class="pass-wrap">
          <input type="password" id="loginPass" placeholder="Mot de passe" />
          <button class="pass-toggle" onclick="togglePass('loginPass', this)">👁️</button>
        </div>
      </div>
      <button class="btn" onclick="login()">Se connecter</button>
      <div class="links"><a onclick="showForgot()">Forgot Password</a></div>
      <div class="msg" id="loginMsg"></div>
    </div>
    <div class="section" id="registerSection">
      <div class="title">Sign Up <span class="heart">♥</span></div>
      <div class="field"><input type="email" id="regEmail" placeholder="Adresse mail" /></div>
      <div class="field">
        <div class="pass-wrap">
          <input type="password" id="regPass" placeholder="Mot de passe" />
          <button class="pass-toggle" onclick="togglePass('regPass', this)">👁️</button>
        </div>
      </div>
      <div class="field">
        <div class="pass-wrap">
          <input type="password" id="regPassConfirm" placeholder="Confirmer mot de passe" />
          <button class="pass-toggle" onclick="togglePass('regPassConfirm', this)">👁️</button>
        </div>
      </div>
      <button class="btn" onclick="register()">Créer mon compte</button>
      <div class="msg" id="registerMsg"></div>
    </div>
    <div class="section" id="forgotSection">
      <div class="title">Reset <span class="heart">♥</span></div>
      <p class="forgot-desc">Entre ton adresse mail, on t'envoie un lien de réinitialisation.</p>
      <div class="field"><input type="email" id="forgotEmail" placeholder="Adresse mail" /></div>
      <button class="btn" onclick="forgotPassword()">Envoyer</button>
      <div class="links"><a onclick="switchTab('login')">← Retour</a></div>
      <div class="msg" id="forgotMsg"></div>
    </div>
  </div>

  <div class="dashboard" id="dashboard">
    <div class="dash-header">
      <div class="dash-avatar">👾</div>
      <div class="dash-name">Bienvenue !</div>
      <div class="dash-email" id="dashEmail"></div>
    </div>
    <div class="dash-tabs">
      <button class="dash-tab active" onclick="switchDash('jeux')">🎮 Jeux</button>
      <button class="dash-tab" onclick="switchDash('parametres')">⚙️ Paramètres</button>
    </div>
    <div class="dash-content">
      <div class="dash-section active" id="jeuxSection">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" id="searchInput" placeholder="Rechercher un jeu..." oninput="filterGames()" />
        </div>
        <div class="game-grid" id="gameGrid"></div>
        <div class="no-result" id="noResult" style="display:none;">Aucun jeu trouvé 😕</div>
      </div>
      <div class="dash-section" id="parametresSection">
        <div class="setting-block">
          <div class="setting-title">🔒 Changer le mot de passe</div>
          <div class="field">
            <div class="pass-wrap">
              <input type="password" id="newPass" placeholder="Nouveau mot de passe" />
              <button class="pass-toggle" onclick="togglePass('newPass', this)">👁️</button>
            </div>
          </div>
          <div class="field">
            <div class="pass-wrap">
              <input type="password" id="newPassConf" placeholder="Confirmer" />
              <button class="pass-toggle" onclick="togglePass('newPassConf', this)">👁️</button>
            </div>
          </div>
          <button class="btn-sm" onclick="changePassword()">Mettre à jour</button>
          <div class="msg" id="passMsg"></div>
        </div>
        <div class="setting-block">
          <div class="setting-title">🚪 Déconnexion</div>
          <button class="btn-logout-dash" onclick="logout()">Se déconnecter</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-icon" id="modalIcon"></div>
      <div>
        <div class="modal-title" id="modalTitle"></div>
        <div class="modal-sub">Mes sauvegardes</div>
      </div>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<script>
  const SECRET = 'xK9mP2qL7nT4';
  const p = new URLSearchParams(window.location.search);
  if (p.get('code') !== SECRET) {
    document.body.innerHTML = `<div style="min-height:100vh;background:#0d0d1a;display:flex;align-items:center;justify-content:center;font-family:'Poppins',sans-serif;flex-direction:column;gap:16px;"><div style="font-size:3rem;">🔒</div><h1 style="color:#ff4d9e;font-size:1.2rem;letter-spacing:3px;text-transform:uppercase;">Accès Interdit</h1><p style="color:#555a7a;font-size:0.85rem;">Vous n'êtes pas autorisé à accéder à cette page.</p></div>`;
  }

  // Toggle œil mot de passe
  function togglePass(inputId, btn) {
    const input = document.getElementById(inputId);
    if (input.type === 'password') {
      input.type = 'text';
      btn.style.opacity = '1';
    } else {
      input.type = 'password';
      btn.style.opacity = '0.5';
    }
  }

  // Toggle œil dans la modal (par index unique)
  function toggleSavePass(spanId, btn) {
    const span = document.getElementById(spanId);
    const isHidden = span.dataset.hidden === 'true';
    if (isHidden) {
      span.textContent = span.dataset.pass;
      span.dataset.hidden = 'false';
      btn.style.opacity = '1';
    } else {
      span.textContent = '•'.repeat(span.dataset.pass.length);
      span.dataset.hidden = 'true';
      btn.style.opacity = '0.5';
    }
  }

  const GAMES = [
    { icon: '⚔️',  name: 'Fortnite',         status: 'Battle Royale' },
    { icon: '🧱',  name: 'Minecraft',         status: 'Survie / Créatif' },
    { icon: '🎯',  name: 'Valorant',          status: 'FPS Tactique' },
    { icon: '🏎️', name: 'Rocket League',     status: 'Sport' },
    { icon: '🔫',  name: 'Call of Duty',      status: 'FPS' },
    { icon: '🧟',  name: 'Warzone',           status: 'Battle Royale' },
    { icon: '🐉',  name: 'League of Legends', status: 'MOBA' },
    { icon: '🌍',  name: 'GTA V',             status: 'Open World' },
    { icon: '🕹️', name: 'Roblox',            status: 'Multijoueur' },
    { icon: '🏹',  name: 'Apex Legends',      status: 'Battle Royale' },
    { icon: '⚽',  name: 'FIFA 24',           status: 'Sport' },
    { icon: '🧠',  name: 'Among Us',          status: 'Social' },
    { icon: '🚀',  name: 'Starfield',         status: 'RPG Espace' },
    { icon: '🗡️', name: 'Elden Ring',        status: 'Action RPG' },
    { icon: '🎲',  name: 'Overwatch 2',       status: 'Hero Shooter' },
    { icon: '🌲',  name: 'Rust',              status: 'Survie' },
    { icon: '🎸',  name: 'Cyberpunk 2077',    status: 'Open World RPG' },
    { icon: '🐺',  name: 'The Witcher 3',     status: 'RPG' },
    { icon: '🏔️', name: 'Hogwarts Legacy',   status: 'Action RPG' },
    { icon: '🎮',  name: 'Fall Guys',         status: 'Party Game' },
  ];

  let gameSaves = {};
  let currentGame = null;
  let editingId = null;

  function getKey(name) { return name.replace(/\s/g,'_'); }
  function getSaves(name) { return gameSaves[getKey(name)] || []; }

  function renderGames(list) {
    const grid = document.getElementById('gameGrid');
    const noResult = document.getElementById('noResult');
    if (list.length === 0) { grid.innerHTML = ''; noResult.style.display = 'block'; return; }
    noResult.style.display = 'none';
    grid.innerHTML = list.map(g => {
      const saves = getSaves(g.name);
      return `
        <div class="game-card ${saves.length>0?'has-saves':''}" onclick="openModal('${g.name}','${g.icon}')">
          ${saves.length>0?`<span class="save-count">${saves.length}</span>`:''}
          <div class="icon">${g.icon}</div>
          <div class="name">${g.name}</div>
          <div class="status">${g.status}</div>
        </div>`;
    }).join('');
  }

  function filterGames() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    renderGames(GAMES.filter(g => g.name.toLowerCase().includes(q)));
  }

  function openModal(name, icon) {
    currentGame = name; editingId = null;
    document.getElementById('modalIcon').textContent = icon;
    document.getElementById('modalTitle').textContent = name;
    renderModalBody();
    document.getElementById('modalOverlay').classList.add('open');
  }

  function renderModalBody() {
    const saves = getSaves(currentGame);
    let html = '';

    if (saves.length === 0) {
      html += `<div class="empty-saves">Aucune sauvegarde pour ce jeu.<br>Crée-en une ! 👇</div>`;
    } else {
      saves.forEach((s, i) => {
        const spanId = 'pass_' + s.id;
        html += `
          <div class="save-item">
            <div class="save-item-header">
              <span class="save-label">👤 ${s.pseudo}</span>
              <div class="save-actions">
                <button class="btn-icon" onclick="startEdit('${s.id}')" title="Modifier">✏️</button>
                <button class="btn-icon" onclick="deleteSave('${s.id}')" title="Supprimer">🗑️</button>
              </div>
            </div>
            <div class="save-row">
              <span class="save-key">Identifiant</span>
              <span class="save-val">${s.user}</span>
            </div>
            <div class="save-row">
              <span class="save-key">Mot de passe</span>
              <span class="save-val">
                <span id="${spanId}" data-pass="${s.pass}" data-hidden="true">${'•'.repeat(s.pass.length)}</span>
                <button class="eye-btn" onclick="toggleSavePass('${spanId}', this)">👁️</button>
              </span>
            </div>
          </div>`;
      });
    }

    html += `
      <div class="add-form" id="addForm">
        <div class="add-form-title" id="addFormTitle">➕ Nouvelle sauvegarde</div>
        <div class="field"><input type="text" id="savePseudo" placeholder="Pseudo (ex: MonPseudo123)" /></div>
        <div class="field"><input type="text" id="saveUser" placeholder="Identifiant" /></div>
        <div class="field">
          <div class="pass-wrap">
            <input type="password" id="savePass" placeholder="Mot de passe" />
            <button class="pass-toggle" onclick="togglePass('savePass', this)">👁️</button>
          </div>
        </div>
        <div class="form-btns">
          <button class="btn-save-sm" onclick="confirmSave()">💾 Sauvegarder</button>
          <button class="btn-cancel-sm" onclick="cancelAdd()">Annuler</button>
        </div>
      </div>
      <button class="btn-add" id="btnAdd" onclick="showAddForm()">➕ Créer une sauvegarde</button>
      <button class="btn-close-modal" onclick="closeModal()">Fermer</button>
    `;

    document.getElementById('modalBody').innerHTML = html;
  }

  function showAddForm() {
    editingId = null;
    document.getElementById('addFormTitle').textContent = '➕ Nouvelle sauvegarde';
    ['savePseudo','saveUser','savePass'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('addForm').classList.add('open');
    document.getElementById('btnAdd').style.display = 'none';
  }

  function cancelAdd() {
    editingId = null;
    document.getElementById('addForm').classList.remove('open');
    document.getElementById('btnAdd').style.display = 'block';
  }

  function startEdit(id) {
    const save = getSaves(currentGame).find(s => s.id === id);
    if (!save) return;
    editingId = id;
    document.getElementById('addFormTitle').textContent = '✏️ Modifier la sauvegarde';
    document.getElementById('savePseudo').value = save.pseudo;
    document.getElementById('saveUser').value = save.user;
    document.getElementById('savePass').value = save.pass;
    document.getElementById('addForm').classList.add('open');
    document.getElementById('btnAdd').style.display = 'none';
  }

  function confirmSave() {
    const pseudo = document.getElementById('savePseudo').value.trim();
    const user   = document.getElementById('saveUser').value.trim();
    const pass   = document.getElementById('savePass').value;
    if (!user || !pass) { alert('⚠️ Identifiant et mot de passe requis !'); return; }
    const key = getKey(currentGame);
    if (!gameSaves[key]) gameSaves[key] = [];
    if (editingId) {
      const idx = gameSaves[key].findIndex(s => s.id === editingId);
      if (idx !== -1) gameSaves[key][idx] = { id: editingId, pseudo: pseudo || user, user, pass };
    } else {
      gameSaves[key].push({ id: Date.now().toString(), pseudo: pseudo || user, user, pass });
    }
    editingId = null;
    renderModalBody();
    filterGames();
  }

  function deleteSave(id) {
    const key = getKey(currentGame);
    gameSaves[key] = (gameSaves[key] || []).filter(s => s.id !== id);
    renderModalBody();
    filterGames();
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    currentGame = null; editingId = null;
  }

  document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  window.addEventListener('load', () => renderGames(GAMES));
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendPasswordResetEmail, updatePassword, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCm26ejmDZghPfnmNW9hOp71Z3NVnchZXc",
    authDomain: "monlogin-41e0e.firebaseapp.com",
    projectId: "monlogin-41e0e",
    storageBucket: "monlogin-41e0e.firebasestorage.app",
    messagingSenderId: "699665895535",
    appId: "1:699665895535:web:46931d57611ad69e1a3d9a",
    measurementId: "G-8BCVYH59B5"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  function showMsg(id, text, type) {
    const el = document.getElementById(id);
    el.textContent = text; el.className = 'msg ' + type; el.style.display = 'block';
  }
  function hideAllMsgs() { document.querySelectorAll('.msg').forEach(m => m.style.display = 'none'); }

  window.switchTab = function(tab) {
    document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register')));
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(tab==='login'?'loginSection':'registerSection').classList.add('active');
    document.getElementById('tabsBar').style.display = 'flex';
    hideAllMsgs();
  }
  window.showForgot = function() {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById('forgotSection').classList.add('active');
    document.getElementById('tabsBar').style.display = 'none';
    hideAllMsgs();
  }
  window.switchDash = function(tab) {
    document.querySelectorAll('.dash-tab').forEach((t, i) => t.classList.toggle('active', (i===0&&tab==='jeux')||(i===1&&tab==='parametres')));
    document.querySelectorAll('.dash-section').forEach(s => s.classList.remove('active'));
    document.getElementById(tab==='jeux'?'jeuxSection':'parametresSection').classList.add('active');
    hideAllMsgs();
  }
  window.register = async function() {
    const email = document.getElementById('regEmail').value.trim();
    const pass  = document.getElementById('regPass').value;
    const conf  = document.getElementById('regPassConfirm').value;
    if (!email||!pass||!conf) { showMsg('registerMsg','⚠️ Remplis tous les champs !','error'); return; }
    if (pass.length<6)        { showMsg('registerMsg','⚠️ Min 6 caractères.','error'); return; }
    if (pass!==conf)           { showMsg('registerMsg','❌ Mots de passe différents.','error'); return; }
    try {
      await createUserWithEmailAndPassword(auth, email, pass);
      showMsg('registerMsg','✅ Compte créé !','success');
      ['regEmail','regPass','regPassConfirm'].forEach(id => document.getElementById(id).value='');
      setTimeout(()=>window.switchTab('login'),1500);
    } catch(e) {
      showMsg('registerMsg', e.code==='auth/email-already-in-use'?'❌ Email déjà utilisé.':'❌ '+e.message, 'error');
    }
  }
  window.login = async function() {
    const email = document.getElementById('loginEmail').value.trim();
    const pass  = document.getElementById('loginPass').value;
    if (!email||!pass) { showMsg('loginMsg','⚠️ Remplis tous les champs !','error'); return; }
    try {
      const result = await signInWithEmailAndPassword(auth, email, pass);
      document.getElementById('tabsBar').style.display = 'none';
      document.getElementById('authContent').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      document.getElementById('dashEmail').textContent = result.user.email;
    } catch(e) { showMsg('loginMsg','❌ Email ou mot de passe incorrect.','error'); }
  }
  window.forgotPassword = async function() {
    const email = document.getElementById('forgotEmail').value.trim();
    if (!email) { showMsg('forgotMsg','⚠️ Entre ton adresse mail !','error'); return; }
    try {
      await sendPasswordResetEmail(auth, email);
      showMsg('forgotMsg','📧 Email envoyé !','info');
      document.getElementById('forgotEmail').value='';
      setTimeout(()=>window.switchTab('login'),2500);
    } catch(e) { showMsg('forgotMsg','❌ '+e.message,'error'); }
  }
  window.changePassword = async function() {
    const newPass = document.getElementById('newPass').value;
    const conf    = document.getElementById('newPassConf').value;
    if (!newPass||!conf)  { showMsg('passMsg','⚠️ Remplis les deux champs !','error'); return; }
    if (newPass.length<6) { showMsg('passMsg','⚠️ Min 6 caractères.','error'); return; }
    if (newPass!==conf)    { showMsg('passMsg','❌ Mots de passe différents.','error'); return; }
    try {
      await updatePassword(auth.currentUser, newPass);
      showMsg('passMsg','✅ Mot de passe mis à jour !','success');
      ['newPass','newPassConf'].forEach(id=>document.getElementById(id).value='');
    } catch(e) { showMsg('passMsg','❌ '+e.message,'error'); }
  }
  window.logout = async function() {
    await signOut(auth);
    document.getElementById('dashboard').style.display='none';
    document.getElementById('tabsBar').style.display='flex';
    document.getElementById('authContent').style.display='block';
    ['loginEmail','loginPass'].forEach(id=>document.getElementById(id).value='');
    window.switchTab('login');
  }
</script>
</body>
